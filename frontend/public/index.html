  <!-- <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"> -->

  <title>MVP SaaS Stoyann | Solution de Gestion</title>

  <!-- UX : Styles pour le loader initial (évite le "flash" blanc) -->
  <style>
    /* Loader affiché avant que React ne charge */
    #initial-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      /* Couleur de fond de votre app */
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.3s ease-out;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #2563EB;
      /* Couleur principale de votre marque */
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* Cache le loader une fois React prêt (classe ajoutée par JS ou manuellement pour test) */
    .loaded #initial-loader {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <!-- Message pour les utilisateurs sans JS (accessibilité) -->
  <noscript>Vous devez activer JavaScript pour exécuter cette application. Notre solution SaaS nécessite un navigateur
    moderne.</noscript>

  <!-- Point de montage React -->
  <div id="root">
    <!-- Loader intégré : L'utilisateur voit ça immédiatement, puis React le remplace -->
    <div id="initial-loader">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- 
    CONSEIL POUR GROS SaaS :
    Placez ici vos scripts de tracking (Google Analytics, Hotjar, Crisp, etc.)
    Assurez-vous qu'ils sont conformes au RGPD (gestion du consentement).
  -->
  <!-- Exemple : <script defer src="https://analytics.example.com/script.js"></script> -->

</body>
